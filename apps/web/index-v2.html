<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>呜哩 Uli - 魔法森林</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', sans-serif; background: #FFF8E7; }
      @keyframes firefly-loader {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.3); }
      }
      .loader { display: flex; gap: 8px; justify-content: center; padding-top: 45vh; }
      .loader span { width: 8px; height: 8px; border-radius: 50%; background: #F5B041; animation: firefly-loader 1.2s ease-in-out infinite; }
      .loader span:nth-child(2) { animation-delay: 0.2s; }
      .loader span:nth-child(3) { animation-delay: 0.4s; }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loader"><span></span><span></span><span></span></div>
    </div>
    <script type="module" src="/src/main-v2.tsx"></script>
  </body>
</html>
